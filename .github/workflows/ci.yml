name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Unit tests
        env:
          FORTIOS_HOST: fake-fortigate.local
          FORTIOS_API_TOKEN: fake-token
          FORTIOS_VERIFY_SSL: "false"
        run: uv run pytest tests/ --ignore=tests/integration -v --tb=short

      - name: Coverage
        env:
          FORTIOS_HOST: fake-fortigate.local
          FORTIOS_API_TOKEN: fake-token
          FORTIOS_VERIFY_SSL: "false"
        run: uv run pytest tests/ --ignore=tests/integration --cov=src/fortios_mcp --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
