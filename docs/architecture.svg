<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!--
    fortios-mcp architecture diagram
    Color palette (Fortinet brand-inspired):
      #DA291C  Fortinet red
      #2D2A26  Slate / dark
      #F5F5F5  Canvas
      #0B7285  Teal accent (MCP)
      #2E7D32  Green accent (FortiGate ok)
  -->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#ECEEF1"/>
    </linearGradient>

    <linearGradient id="mcpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B7285"/>
      <stop offset="100%" stop-color="#084E5C"/>
    </linearGradient>

    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF0F3"/>
    </linearGradient>

    <linearGradient id="fgtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DA291C"/>
      <stop offset="100%" stop-color="#A31C13"/>
    </linearGradient>

    <linearGradient id="chasGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3733"/>
      <stop offset="100%" stop-color="#1F1C19"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2D2A26"/>
    </marker>

    <marker id="arrowHeadRed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#DA291C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#2D2A26">
    fortios-mcp — High-Level Architecture
  </text>
  <text x="600" y="76" text-anchor="middle" font-size="14" fill="#555">
    A Model Context Protocol server that drives a FortiGate via FortiOS REST API v2
  </text>

  <!-- =========================================================
       LEFT: MCP Client (Claude, etc.)
       ========================================================= -->
  <g transform="translate(60,190)" filter="url(#softShadow)">
    <rect width="240" height="260" rx="14" fill="url(#mcpGrad)"/>
    <text x="120" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF" letter-spacing="2">
      MCP CLIENT
    </text>

    <!-- Simple chat/LLM glyph -->
    <g transform="translate(60,60)">
      <rect x="0" y="20" width="120" height="90" rx="10" fill="#FFFFFF" opacity="0.95"/>
      <rect x="10" y="34" width="85" height="8" rx="4" fill="#0B7285"/>
      <rect x="10" y="50" width="100" height="6" rx="3" fill="#B7D7DE"/>
      <rect x="10" y="64" width="70" height="6" rx="3" fill="#B7D7DE"/>
      <rect x="10" y="78" width="90" height="6" rx="3" fill="#B7D7DE"/>
      <!-- speech tail -->
      <path d="M20,110 L32,110 L26,124 Z" fill="#FFFFFF" opacity="0.95"/>
    </g>

    <text x="120" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">
      Claude Desktop
    </text>
    <text x="120" y="230" text-anchor="middle" font-size="13" fill="#CDEAF0">
      Claude Code · IDE plug-ins
    </text>
    <text x="120" y="248" text-anchor="middle" font-size="13" fill="#CDEAF0">
      Any MCP-capable agent
    </text>
  </g>

  <!-- =========================================================
       MIDDLE: FortiOS MCP Server
       ========================================================= -->
  <g transform="translate(400,160)" filter="url(#softShadow)">
    <rect width="400" height="340" rx="16" fill="url(#serverGrad)" stroke="#CFD4DA" stroke-width="1"/>

    <!-- Header strip -->
    <rect width="400" height="48" rx="16" fill="#2D2A26"/>
    <rect y="32" width="400" height="16" fill="#2D2A26"/>
    <text x="200" y="31" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">
      fortios-mcp server
    </text>

    <!-- FastMCP block -->
    <g transform="translate(24,72)">
      <rect width="352" height="74" rx="10" fill="#FFFFFF" stroke="#0B7285" stroke-width="1.5"/>
      <text x="16" y="26" font-size="14" font-weight="700" fill="#0B7285">FastMCP runtime</text>
      <text x="16" y="48" font-size="12" fill="#333">Tool registration · stdio &amp; streamable-HTTP</text>
      <text x="16" y="64" font-size="12" fill="#333">Lifespan · auth · transport selection</text>
    </g>

    <!-- Tools row -->
    <g transform="translate(24,160)">
      <!-- Generic -->
      <rect width="108" height="84" rx="8" fill="#FFF7E6" stroke="#E0A020" stroke-width="1.2"/>
      <text x="54" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7A5B00">Generic</text>
      <text x="54" y="40" text-anchor="middle" font-size="11" fill="#333">cmdb_* · monitor</text>
      <text x="54" y="56" text-anchor="middle" font-size="11" fill="#333">log · service</text>
      <text x="54" y="72" text-anchor="middle" font-size="11" fill="#333">8 primitives</text>

      <!-- Schema -->
      <rect x="122" width="108" height="84" rx="8" fill="#E7F1FB" stroke="#1F6FBF" stroke-width="1.2"/>
      <text x="176" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#154A80">Schema</text>
      <text x="176" y="40" text-anchor="middle" font-size="11" fill="#333">Swagger index</text>
      <text x="176" y="56" text-anchor="middle" font-size="11" fill="#333">describe · search</text>
      <text x="176" y="72" text-anchor="middle" font-size="11" fill="#333">4 discovery tools</text>

      <!-- Curated -->
      <rect x="244" width="108" height="84" rx="8" fill="#E9F7EC" stroke="#2E7D32" stroke-width="1.2"/>
      <text x="298" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1F5A23">Curated</text>
      <text x="298" y="40" text-anchor="middle" font-size="11" fill="#333">Firewall · routing</text>
      <text x="298" y="56" text-anchor="middle" font-size="11" fill="#333">VPN · monitor · log</text>
      <text x="298" y="72" text-anchor="middle" font-size="11" fill="#333">~60 wrappers</text>
    </g>

    <!-- FortiOSClient (httpx) -->
    <g transform="translate(24,258)">
      <rect width="352" height="64" rx="10" fill="#FFFFFF" stroke="#DA291C" stroke-width="1.5"/>
      <circle cx="28" cy="32" r="12" fill="#DA291C"/>
      <text x="28" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">C</text>
      <text x="52" y="24" font-size="14" font-weight="700" fill="#DA291C">FortiOSClient (httpx async)</text>
      <text x="52" y="42" font-size="11" fill="#444">Bearer-token auth · envelope unwrap · typed errors</text>
      <text x="52" y="56" font-size="11" fill="#444">Retry / backoff · TLS verify · write-guard enforcement</text>
    </g>
  </g>

  <!-- =========================================================
       RIGHT: FortiGate appliance
       ========================================================= -->
  <g transform="translate(900,200)" filter="url(#softShadow)">
    <!-- Chassis -->
    <rect width="240" height="240" rx="14" fill="url(#chasGrad)"/>

    <!-- Top brand strip -->
    <rect width="240" height="42" rx="14" fill="url(#fgtGrad)"/>
    <rect y="26" width="240" height="16" fill="url(#fgtGrad)"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#FFFFFF" letter-spacing="3">
      FORTIGATE
    </text>

    <!-- Fortinet-style "F" badge -->
    <g transform="translate(14,54)">
      <rect width="36" height="36" rx="6" fill="#DA291C"/>
      <path d="M10,8 L28,8 L28,13 L16,13 L16,19 L26,19 L26,24 L16,24 L16,30 L10,30 Z" fill="#FFFFFF"/>
    </g>
    <text x="60" y="78" font-size="13" font-weight="700" fill="#FFFFFF">FortiOS 7.6.x</text>
    <text x="60" y="94" font-size="11" fill="#C9C6C2">REST API v2</text>

    <!-- API endpoint rows -->
    <g transform="translate(20,110)" font-family="'SF Mono', Menlo, Consolas, monospace">
      <rect width="200" height="22" rx="4" fill="#FFFFFF" opacity="0.08"/>
      <text x="10" y="15" font-size="11" fill="#FFE9E5">/api/v2/cmdb</text>
      <circle cx="186" cy="11" r="4" fill="#4CAF50"/>

      <rect y="28" width="200" height="22" rx="4" fill="#FFFFFF" opacity="0.08"/>
      <text x="10" y="43" font-size="11" fill="#FFE9E5">/api/v2/monitor</text>
      <circle cx="186" cy="39" r="4" fill="#4CAF50"/>

      <rect y="56" width="200" height="22" rx="4" fill="#FFFFFF" opacity="0.08"/>
      <text x="10" y="71" font-size="11" fill="#FFE9E5">/api/v2/log</text>
      <circle cx="186" cy="67" r="4" fill="#4CAF50"/>

      <rect y="84" width="200" height="22" rx="4" fill="#FFFFFF" opacity="0.08"/>
      <text x="10" y="99" font-size="11" fill="#FFE9E5">/api/v2/service</text>
      <circle cx="186" cy="95" r="4" fill="#4CAF50"/>
    </g>

    <!-- Port row at bottom -->
    <g transform="translate(16,224)">
      <rect width="208" height="8" rx="2" fill="#111"/>
      <g fill="#DA291C">
        <rect x="4"  y="2" width="10" height="4"/>
        <rect x="20" y="2" width="10" height="4"/>
        <rect x="36" y="2" width="10" height="4"/>
        <rect x="52" y="2" width="10" height="4"/>
        <rect x="68" y="2" width="10" height="4"/>
        <rect x="84" y="2" width="10" height="4"/>
        <rect x="100" y="2" width="10" height="4"/>
        <rect x="116" y="2" width="10" height="4"/>
        <rect x="132" y="2" width="10" height="4"/>
        <rect x="148" y="2" width="10" height="4"/>
        <rect x="164" y="2" width="10" height="4"/>
        <rect x="180" y="2" width="10" height="4"/>
      </g>
    </g>
  </g>

  <!-- =========================================================
       Arrows
       ========================================================= -->
  <!-- Client <-> MCP server -->
  <line x1="300" y1="320" x2="400" y2="320" stroke="#2D2A26" stroke-width="2.5"
        marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>
  <rect x="305" y="282" width="90" height="22" rx="6" fill="#FFFFFF" stroke="#CFD4DA"/>
  <text x="350" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="#2D2A26">
    MCP protocol
  </text>
  <text x="350" y="340" text-anchor="middle" font-size="10" fill="#555">
    stdio · HTTP
  </text>

  <!-- MCP server -> FortiGate -->
  <line x1="800" y1="320" x2="900" y2="320" stroke="#DA291C" stroke-width="2.5"
        marker-end="url(#arrowHeadRed)"/>
  <rect x="805" y="282" width="90" height="22" rx="6" fill="#FFFFFF" stroke="#EEC5C0"/>
  <text x="850" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="#DA291C">
    HTTPS + Token
  </text>
  <text x="850" y="340" text-anchor="middle" font-size="10" fill="#555">
    Bearer auth · TLS
  </text>

  <!-- =========================================================
       Legend / footer
       ========================================================= -->
  <g transform="translate(60,560)">
    <rect width="1080" height="124" rx="10" fill="#FFFFFF" stroke="#D7DCE1"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#2D2A26">Operational surfaces</text>

    <g transform="translate(20,44)" font-size="12" fill="#333">
      <circle cx="8" cy="8" r="6" fill="#E0A020"/>
      <text x="24" y="12" font-weight="700">Configuration</text>
      <text x="24" y="30">policies · addresses · services · interfaces · VPN · users</text>
    </g>
    <g transform="translate(290,44)" font-size="12" fill="#333">
      <circle cx="8" cy="8" r="6" fill="#1F6FBF"/>
      <text x="24" y="12" font-weight="700">Troubleshooting</text>
      <text x="24" y="30">ping · traceroute · packet capture · sessions</text>
    </g>
    <g transform="translate(560,44)" font-size="12" fill="#333">
      <circle cx="8" cy="8" r="6" fill="#2E7D32"/>
      <text x="24" y="12" font-weight="700">Monitoring</text>
      <text x="24" y="30">SD-WAN · licenses · Wi-Fi · DHCP · counters</text>
    </g>
    <g transform="translate(820,44)" font-size="12" fill="#333">
      <circle cx="8" cy="8" r="6" fill="#DA291C"/>
      <text x="24" y="12" font-weight="700">Review</text>
      <text x="24" y="30">bulk reads · log search · backup · HA checksum</text>
    </g>

    <line x1="20" y1="86" x2="1060" y2="86" stroke="#E0E4E8"/>
    <text x="20" y="108" font-size="12" fill="#555">
      <tspan font-weight="700" fill="#2D2A26">Safety:</tspan>
      read-only by default — every mutating tool is blocked unless
      <tspan font-family="'SF Mono', Menlo, Consolas, monospace" fill="#DA291C">FORTIOS_ENABLE_WRITES=true</tspan>.
    </text>
  </g>
</svg>
